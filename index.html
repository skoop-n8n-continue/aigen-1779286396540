<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Digital Signage</title>
    <!-- Lucide Icons via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-container">
        <div class="gradient-bg"></div>
        <div class="particles" id="particles"></div>
    </div>

    <div class="signage-container">
        <!-- Header area with date, time, and branding -->
        <header class="signage-header">
            <div class="brand">
                <i class="ti ti-screen-share brand-icon"></i>
                <span class="brand-name">Skoop Agent Signage</span>
            </div>
            <div class="datetime-container">
                <div class="time-display" id="time-display">00:00:00</div>
                <div class="date-display" id="date-display">Wednesday, May 20, 2026</div>
            </div>
        </header>

        <!-- Main Content Area: Hello World Greetings with auto-animations -->
        <main class="signage-main">
            <div class="greeting-box">
                <div class="accent-line"></div>
                <div class="welcome-text">WELCOME</div>
                <h1 class="main-title animate-text" id="greeting-title">Hello World!</h1>
                <p class="subtitle" id="greeting-subtitle">Bringing experiences to life with Skoop.</p>
            </div>
        </main>

        <!-- Footer containing some status info or tickers -->
        <footer class="signage-footer">
            <div class="ticker-wrapper">
                <div class="ticker-content" id="ticker-text">
                    System Active • Live Digital Signage Showcase • Beautifully Powered by Skoop Agent • Delivering dynamic experiences 24/7 • Custom widgets loaded • Keep exploring
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
